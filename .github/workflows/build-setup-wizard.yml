name: Build setup wizard

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --console --name CricketStreamSetup setup_wizard.py

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: CricketStreamSetup-windows
          path: dist/CricketStreamSetup.exe

  # PyInstaller's onefile bootloader appends a single archive (the Python runtime + bundled
  # files) after the Mach-O binary and finds it at runtime via an offset from EOF. Building
  # arm64 and x86_64 separately and lipo-merging them does NOT work for onefile builds —
  # the merged binary's bootloader can only ever discover one of the two archives (whichever
  # occurs last), so it runs fine on one architecture and fails on the other with a
  # "Failed to load Python shared library ... incompatible architecture" error (confirmed by
  # actually building and running it). The correct approach is PyInstaller's own
  # --target-arch universal2, which builds one archive containing both architectures'
  # native libraries — actions/setup-python installs python.org's own universal2 build for
  # Python >= 3.11 on macOS, so no extra Python install step is needed.
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build universal2 binary
        run: pyinstaller --onefile --target-arch universal2 --name CricketStreamSetup setup_wizard.py

      - name: Verify both architectures are present
        run: lipo -info dist/CricketStreamSetup

      - name: Package with a double-clickable launcher
        # A raw Mach-O binary double-clicked in Finder runs with no visible
        # window, so an interactive wizard would appear to hang. A .command
        # file is what Finder opens in Terminal.app automatically.
        run: |
          cd dist
          cat > "Setup Wizard.command" <<'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          ./CricketStreamSetup
          EOF
          chmod +x "Setup Wizard.command" CricketStreamSetup
          zip CricketStreamSetup-mac.zip CricketStreamSetup "Setup Wizard.command"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: CricketStreamSetup-mac
          path: dist/CricketStreamSetup-mac.zip

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Attach binaries to the GitHub release
        uses: softprops/action-gh-release@v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            artifacts/CricketStreamSetup-windows/CricketStreamSetup.exe
            artifacts/CricketStreamSetup-mac/CricketStreamSetup-mac.zip
