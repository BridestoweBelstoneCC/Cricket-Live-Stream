# ─────────────────────────────────────────────────────────────────────────────
# BBCC Stream Overlay — Club Configuration
# Edit this file once. Everything else is automatic.
# Lines starting with # are comments and are ignored.
# ─────────────────────────────────────────────────────────────────────────────

[Club]
# Your club's full name as shown on the scorebar title
name = Bridestowe & Belstone CC

# Short abbreviation for the scorebar (max 6 characters)
abbreviation = BBCC

# Home kit colour in hex format — find yours at htmlcolorcodes.com
home_colour = #1a3a5c

# Your PlayCricket club ID — found in the URL when viewing your club page
# e.g. play-cricket.com/website/results → the number in the URL
playcricket_id = 29434

# Motto shown on replay transition (leave blank to hide)
motto = Up the Stags

[API]
# Your PlayCricket API key — request from ECB/PlayCricket support
# This auto-fills opposition name, umpires, competition on match day
playcricket_key = 

# Anthropic API key — only needed for AI commentary (disabled by default)
# Get a free key at console.anthropic.com
anthropic_key = 

[Scoring]
# Full path to the NV Play / PCS Pro scoreboard output folder
# Windows example: C:/Users/Scorer/Documents/Cricket Matches/_Scoreboards/Output
# Mac example:     /Users/scorer/Documents/Cricket Matches/_Scoreboards/Output
# Leave blank to use PlayCricket widget as fallback (score only, no names)
pcs_output_folder =

# Folder containing club badge PNG files (named by PlayCricket club ID)
# Leave blank to use a logos/ folder next to server.py
logos_folder =

# Only fetch fixtures at this ground (partial match, case-insensitive)
# Leave blank to accept any home ground
ground_filter = Millaton

[OBS]
# Password set in OBS → Tools → WebSocket Server Settings
obs_password = 

# Folder where OBS saves replay buffer clips
# Windows: C:/Users/YourName/Videos/Replays
# Mac:     /Users/yourname/Movies/Replays
replay_folder =

[Stream]
# YouTube title template — {home} and {away} are replaced automatically
youtube_title = LIVE: {home} vs {away} — DCL 2026

# Overs per innings (50 for standard, 40 for T40 etc.)
max_overs = 50

[Auth]
# Cryptographic signing key — used to sign session tokens, never typed by anyone.
# Generate your own: python3 -c "import secrets; print(secrets.token_hex(32))"
# Change this to invalidate all active sessions immediately.
control_token =

# Club password — what operators type in the login form.
# Pick something memorable but hard to guess. Share only with trusted operators.
# Leave blank to disable auth entirely (safe on localhost only).
club_password =
